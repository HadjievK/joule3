apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: sf-payroll-agent
  version: 1.0.0
  description: AI agent for SAP SuccessFactors payroll operations - natural language queries, anomaly detection, tax compliance validation, and compensation management.

type: agent

container:
  buildPath: .
  port: 5000

provides:
  apis:
    - name: sf-payroll-agent
      kind: a2a
      ordId: sap.cadartifact:apiResource:sf-payroll-agent-7eabd.sf-payroll-agent:v1

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
